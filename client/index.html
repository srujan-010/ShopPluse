<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.ibb.co/9mVRXF5q/Chat-GPT-Image-May-14-2026-01-56-04-PM.png" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#1E6BFF" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopPulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Clear service workers in development to prevent caching issues
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.includes('ngrok')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister().then(success => {
                if (success) console.log('Successfully unregistered Service Worker');
              });
            }
          });
        }
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
